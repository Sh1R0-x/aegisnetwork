<!DOCTYPE html><html><head><style>
body{font-family:Inter,sans-serif;background:#1E293B;color:#fff;padding:40px;display:flex;flex-wrap:wrap;gap:40px;justify-content:center}
.box{text-align:center;padding:20px;border-radius:12px}
.box img,.box svg{display:block;margin:0 auto 10px}
.label{font-size:11px;color:#94A3B8;margin-top:8px}
.dark-bg{background:#020617}.light-bg{background:#F8FAFC}.blue-bg{background:#2563EB}
</style></head><body>
<div class="box light-bg"><img src="assets/logo-icon-gradient.svg" width="80" height="80"><div class="label" style="color:#333">Gradient (light bg)</div></div>
<div class="box dark-bg"><img src="assets/logo-icon-gradient.svg" width="80" height="80"><div class="label">Gradient (dark bg)</div></div>
<div class="box light-bg"><img src="assets/logo-icon-blue.svg" width="80" height="80"><div class="label" style="color:#333">Blue monochrome</div></div>
<div class="box light-bg"><img src="assets/logo-icon-dark.svg" width="80" height="80"><div class="label" style="color:#333">Dark monochrome</div></div>
<div class="box dark-bg"><img src="assets/logo-icon-white.svg" width="80" height="80"><div class="label">White monochrome</div></div>
<div class="box blue-bg"><img src="assets/logo-icon-white.svg" width="80" height="80"><div class="label" style="color:rgba(255,255,255,0.7)">White on blue</div></div>
<div class="box dark-bg"><img src="assets/logo-icon-clean.svg" width="80" height="80"><div class="label">Clean (no nodes)</div></div>
</body></html>
